# investment_calculator.settleup.site — proxied to docker compose on 127.0.0.1:8082
# Cloudflare handles SSL; this server only speaks HTTP to Cloudflare.
# Cloudflare real-IP trust is configured globally (see habitat.settleup.site site).
# Authentication is handled inside the Vue app (signed cookie via /api/auth/login).

server {
  listen 80;
  listen [::]:80;
  server_name investment_calculator.settleup.site;

  client_max_body_size 5m;

  location / {
    proxy_pass http://127.0.0.1:8082;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_read_timeout 90s;
    proxy_send_timeout 90s;
  }
}
